# Python EDA Analysis - Environment Configuration (Conda)

name: python-eda
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.11
  - jupyter
  - jupyterlab
  - pandas
  - numpy
  - matplotlib
  - seaborn
  - scikit-learn
  - scipy
  - plotly
  - ipykernel
  - ipywidgets
  - pip
  - pip:
    - pandas-profiling>=3.6.0
    - python-dotenv>=1.0.0
